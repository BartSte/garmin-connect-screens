name: Release data screen

# Triggered by a version tag scoped to a specific screen, e.g.:
#   git tag screens/minimal-7/v1.0.0
#   git push origin screens/minimal-7/v1.0.0
on:
  push:
    tags:
      - 'screens/*/v[0-9]*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ── Derive screen name and semver from the tag ────────────────────
      # Tag format: screens/<screen-name>/v<semver>
      - name: Parse tag
        id: tag
        run: |
          # GITHUB_REF_NAME = "screens/minimal-7/v1.0.0"
          SCREEN=$(echo "$GITHUB_REF_NAME"  | cut -d'/' -f2)   # minimal-7
          VERSION=$(echo "$GITHUB_REF_NAME" | cut -d'/' -f3)   # v1.0.0
          echo "screen=$SCREEN"   >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      # ── Install the Connect IQ SDK manager CLI ───────────────────────
      # Headless replacement for the Garmin GUI SDK Manager.
      # Repo: https://github.com/lindell/connect-iq-sdk-manager-cli
      - name: Install connect-iq-sdk-manager
        run: |
          curl -fsSL https://raw.githubusercontent.com/lindell/connect-iq-sdk-manager-cli/master/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      # ── Accept the Garmin license agreement non-interactively ─────────
      # Capture the hash once locally:
      #   connect-iq-sdk-manager agreement view
      # Store the printed hash as a repository variable: CONNECT_IQ_AGREEMENT_HASH
      # If this step fails, the agreement text has been updated by Garmin —
      # re-run 'agreement view' locally and update the variable.
      - name: Accept Connect IQ license agreement
        run: |
          connect-iq-sdk-manager agreement accept \
            --agreement-hash "${{ vars.CONNECT_IQ_AGREEMENT_HASH }}"

      # ── Download the Connect IQ SDK ───────────────────────────────────
      - name: Install Connect IQ SDK
        run: |
          connect-iq-sdk-manager sdk download ">=8.4.0"
          connect-iq-sdk-manager sdk set ">=8.4.0"
          echo "$(connect-iq-sdk-manager sdk current-path --bin)" >> "$GITHUB_PATH"

      # ── Write the developer key from the repository secret ────────────
      # CIQ_DEVELOPER_KEY must be the base64-encoded content of developer_key.der.
      # Generate once locally:
      #   openssl genrsa -out developer_key.pem 4096
      #   openssl pkcs8 -topk8 -inform PEM -outform DER \
      #       -in developer_key.pem -out developer_key.der -nocrypt
      #   base64 developer_key.der   # paste this into the GitHub secret
      - name: Write developer key
        run: |
          echo "${{ secrets.CIQ_DEVELOPER_KEY }}" | base64 -d > developer_key.der

      # ── Compile the data field to a signed .iq package ───────────────
      - name: Build
        run: |
          SCREEN="${{ steps.tag.outputs.screen }}"
          mkdir -p "screens/$SCREEN/bin"
          monkeyc \
            -f "screens/$SCREEN/monkey.jungle" \
            -o "screens/$SCREEN/bin/$SCREEN.iq" \
            -y developer_key.der \
            -e \
            -r \
            -w

      # ── Publish the .iq file as a GitHub release ──────────────────────
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: "${{ steps.tag.outputs.screen }} ${{ steps.tag.outputs.version }}"
          files: "screens/${{ steps.tag.outputs.screen }}/bin/${{ steps.tag.outputs.screen }}.iq"
